<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Place Your Order</title>

    <link rel="stylesheet" href="order.css">
</head>
<body>
<div class="container">
    <div class="order-card">
        <h1>Place Your Order</h1>
        <p>Fill in your details and place the order</p>
        <form>
            <div class="section">
                <h2>👤 Personal Details</h2>
                <input type="text" placeholder="Enter your full name">
                <input type="tel" placeholder="Enter your phone number">
            </div>
            <div class="section">
                <h2>🍽 Select Food</h2>
                <select id="food">
                    <option value="179">Noodles</option>
                    <option value="99">Ice cream</option>
                    <option value="249">paneer</option>
                    <option value="199">Pizza</option>
                    <option value="149">Burger</option>
                    <option value="150">GobiManchurian</option>
                    <option value="299">Chicken Biryani</option>
                    <option value="260">Chicken Lollipop</option>
                </select>
            </div>
            <div class="section">
                <h2>📍 Delivery Address</h2>
                <textarea rows="5"
                placeholder="Enter your delivery address"></textarea>
            </div>
            <div class="section">
                <h2>📦 Quantity</h2>
                <input type="number" id="quantity" value="1" min="1">
            </div>
            <div class="price">
                <p> Item Total <span id="itemTotal">₹199</span></p>
                <p>Delivery Charges <span id="delivery">₹25</span></p>
                <hr>
                <h3>To Pay <span id="totalPay">₹224/span></h3>

            </div>

            <button type="submit">
                Place Order
            </button>

        </form>

    </div>
    <script src="order.js"></script>

</div>
</body>
</html>
